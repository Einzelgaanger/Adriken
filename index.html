<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#e07a5f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="icon" href="/favicon.png" type="image/png" />

    <!-- Primary SEO -->
    <title>Adriken — Find Services & Businesses Near You | AI-Powered Marketplace</title>
    <meta name="description" content="Adriken is an AI-powered marketplace to find and offer local services. Search for providers or list your business — no account required to browse." />
    <meta name="keywords" content="Adriken, local services, service marketplace, AI matching, hire professionals, find businesses, Kenya services, Nairobi services" />
    <meta name="author" content="Adriken" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="google-site-verification" content="dce7154c86345d09" />
    <link rel="canonical" href="https://adriken.onrender.com/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Neucha&family=Electrolize&display=swap" rel="stylesheet" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Electrolize&display=swap');
    </style>

    <!-- Open Graph / Facebook / WhatsApp / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://adriken.onrender.com/" />
    <meta property="og:title" content="Adriken — Need a Service? Grow Your Business?" />
    <meta property="og:description" content="AI-powered marketplace to find local help or grow your business. Search by name or describe what you need — we connect you." />
    <meta property="og:image" content="https://adriken.onrender.com/og-image-v3.jpg" />
    <meta property="og:image:secure_url" content="https://adriken.onrender.com/og-image-v3.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Adriken - AI-Powered Service Marketplace" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:site_name" content="Adriken" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Adriken — Need a Service? Grow Your Business?" />
    <meta name="twitter:description" content="AI-powered marketplace to find local help or grow your business. We connect you." />
    <meta name="twitter:image" content="https://adriken.onrender.com/og-image-v3.jpg" />
    <meta name="twitter:image:alt" content="Adriken - AI-Powered Service Marketplace" />
    <meta name="twitter:url" content="https://adriken.onrender.com/" />

    <!-- Additional SEO for link previews on all platforms -->
    <meta itemprop="name" content="Adriken — Find Services & Businesses Near You" />
    <meta itemprop="description" content="AI-powered marketplace to find, rate and connect with local businesses. Search by company name or describe what you need." />
    <meta itemprop="image" content="https://adriken.onrender.com/og-image-v3.jpg" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Adriken",
      "url": "https://adriken.onrender.com/",
      "description": "AI-powered marketplace to find and connect with local businesses and service providers.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://adriken.onrender.com/results?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Adriken",
      "url": "https://adriken.onrender.com/",
      "logo": "https://adriken.onrender.com/favicon.png",
      "description": "AI-powered marketplace connecting people with local businesses and service providers."
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
